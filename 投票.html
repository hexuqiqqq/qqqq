<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>班级活动选题投票</title>
    <style>
        :root {
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-color: #333;
            --bar-height: 40px;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: var(--text-color);
        }

        .container {
            background-color: var(--card-bg);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 600px;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #2c3e50;
        }

        .vote-item {
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 1px solid #eee;
        }

        .header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-weight: bold;
            font-size: 1.1em;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        button {
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.1s, opacity 0.2s;
            color: white;
            font-size: 1rem;
        }

        button:hover {
            opacity: 0.9;
        }

        button:active {
            transform: scale(0.95);
        }

        /* 按钮颜色定义 */
        .btn-1 { background-color: #FF6B6B; } /* 红色 */
        .btn-2 { background-color: #4ECDC4; } /* 青色 */
        .btn-3 { background-color: #45B7D1; } /* 蓝色 */
        .btn-4 { background-color: #96CEB4; } /* 绿色 */
        .btn-5 { background-color: #FFEAA7; color: #333; } /* 黄色 */

        .progress-bg {
            background-color: #eee;
            border-radius: 10px;
            height: var(--bar-height);
            width: 100%;
            overflow: hidden;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            border-radius: 10px;
            transition: width 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 15px;
            color: white;
            font-size: 1em;
            box-sizing: border-box;
            text-shadow: 0 1px 2px rgba(0,0,0,0.2);
            min-width: fit-content;
        }
        
        /* 进度条颜色 */
        .fill-1 { background-color: #FF6B6B; }
        .fill-2 { background-color: #4ECDC4; }
        .fill-3 { background-color: #45B7D1; }
        .fill-4 { background-color: #96CEB4; }
        .fill-5 { background-color: #FFEAA7; color: #333; text-shadow: none; }

        .reset-btn {
            display: block;
            margin: 20px auto 0;
            background-color: #95a5a6;
            font-size: 0.8rem;
            padding: 8px 16px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>班级活动选题</h1>
    <div id="vote-container">
        <!-- 投票项将通过JS动态生成 -->
    </div>
    <button class="reset-btn" onclick="resetData()">重置所有数据</button>
</div>

<script>
    // 配置投票选项
    const options = [
        { id: 1, name: "户外烧烤派对", colorClass: "btn-1", fillClass: "fill-1" },
        { id: 2, name: "密室逃脱挑战", colorClass: "btn-2", fillClass: "fill-2" },
        { id: 3, name: "KTV 欢唱之夜", colorClass: "btn-3", fillClass: "fill-3" },
        { id: 4, name: "集体桌游大会", colorClass: "btn-4", fillClass: "fill-4" },
        { id: 5, name: "看电影/私人影院", colorClass: "btn-5", fillClass: "fill-5" }
    ];

    // 初始化数据
    let votes = JSON.parse(localStorage.getItem('classVoteData')) || {};
    
    // 确保所有选项都有初始值
    options.forEach(opt => {
        if (votes[opt.id] === undefined) {
            votes[opt.id] = 0;
        }
    });

    const container = document.getElementById('vote-container');

    // 保存数据到本地
    function saveData() {
        localStorage.setItem('classVoteData', JSON.stringify(votes));
        updateUI();
    }

    // 投票函数
    function vote(id) {
        votes[id]++;
        saveData();
    }

    // 重置数据
    function resetData() {
        if(confirm("确定要清空所有投票数据吗？")) {
            options.forEach(opt => votes[opt.id] = 0);
            saveData();
        }
    }

    // 更新界面
    function updateUI() {
        // 计算最大值用于百分比显示
        const allVotes = Object.values(votes);
        const maxVotes = Math.max(...allVotes, 1); // 防止除以0，至少为1

        container.innerHTML = ''; // 清空当前内容

        options.forEach(opt => {
            const count = votes[opt.id];
            // 计算宽度百分比
            const percentage = (count / maxVotes) * 100;
            // 即使为0也给一点宽度，或者保持0
            const widthStyle = count === 0 ? '0%' : `${percentage}%`;

            const itemHTML = `
                <div class="vote-item">
                    <div class="header">
                        <span>${opt.name}</span>
                        <span>${count} 票</span>
                    </div>
                    <div class="btn-group">
                        <button class="${opt.colorClass}" onclick="vote(${opt.id})">+1 投票</button>
                    </div>
                    <div class="progress-bg">
                        <div class="progress-fill ${opt.fillClass}" style="width: ${widthStyle}">
                            ${count > 0 ? count : ''}
                        </div>
                    </div>
                </div>
            `;
            container.innerHTML += itemHTML;
        });
    }

    // 页面加载时初始化
    updateUI();

</script>

</body>
</html>
